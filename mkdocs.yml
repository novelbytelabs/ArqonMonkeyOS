      - Security Model: 02_contextbus_infrastructure/SECURITY_MODEL.md
      - Deployment: 02_contextbus_infrastructure/DEPLOYMENT_CLOUDFLARE.md
      - GitHub App Setup: 02_contextbus_infrastructure/GITHUB_APP_SETUP.md
      - Project Integration Guide: 02_contextbus_infrastructure/PROJECT_INTEGRATION_GUIDE.md
  - Commands and Runbooks:
