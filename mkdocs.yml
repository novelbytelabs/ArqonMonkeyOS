site_name: ArqonMonkeyOS Docs
site_description: Documentation for the ArqonMonkeyOS project
site_url: https://novelbytelabs.github.io/ArqonMonkeyOS/
repo_url: https://github.com/novelbytelabs/ArqonMonkeyOS/
repo_name: ArqonMonkeyOS
edit_uri: edit/main/docs/
docs_dir: docs
site_dir: site
dev_addr: 127.0.0.1:8585

theme:
  name: "material"
  logo: assets/favicon.ico
  favicon: assets/favicon.ico
  features:
    #    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.tracking
    - toc.follow
    - content.tabs.link
    - content.code.annotate
    - navigation.top
    - content.code.copy
    - search.highlight
    - search.suggest
    - navigation.instant
  palette:
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Switch to Light mode
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/weather-night
        name: Switch to Dark mode
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - attr_list
  - pymdownx.tasklist:
      custom_checkbox: true
  - toc:
      permalink: true
  - tables
  - admonition
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.details

  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - md_in_html
  - def_list
  - pymdownx.snippets
  - pymdownx.progressbar
  - pymdownx.magiclink
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js
  - javascripts/theme.js
  - javascripts/mathjax.js
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

# Custom CSS file for additional styling
extra_css:
  - stylesheets/extra.css

# Additional configuration
# plugins:
#   - search:
#       separator: '[\s\-,:!=\[\]()"/]+|(?!\b)(?=[A-Z][a-z])|\.|'

# Extra configuration
extra:
  version: "0.2.0-alpha.1 (planned)"
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/novelbytelabs/ArqonMonkeyOS
  analytics:
    provider: google
    property: G-XXXXXXXXXX
    feedback:
      title: Was this page helpful?
      ratings:
        - icon: material/emoticon-happy-outline
          name: This page was helpful
          data: 1
          note: >-
            Thanks for your feedback!
        - icon: material/emoticon-sad-outline
          name: This page could be improved
          data: 0
          note: >-
            Thanks for your feedback! Help us improve this page by
            <a href="https://github.com/novelbytelabs/ArqonMonkeyOS/issues/new/?title=[Feedback]+{title}+-+{url}" target="_blank" rel="noopener">telling us what you found helpful or what could be improved</a>.

copyright: "Copyright &copy; 2026 NovelByte Labs - All rights reserved."

plugins:
  - search:
  - minify:
      minify_html: true

validation:
  omitted_files: ignore


nav:
  - Home: index.md
  - Active State:
      - Current State: 00_active_state/CURRENT_STATE.md
      - Open Decisions: 00_active_state/OPEN_DECISIONS.md
      - Roadmap: 00_active_state/ROADMAP.md
      - Transition Checklist: 00_active_state/TRANSITION_CHECKLIST.md
  - MonkeyOS Doctrine:
      - Doctrine: 01_monkeyos_doctrine/MONKEYOS_CONTEXTBUS_DOCTRINE.md
      - Rename Readiness: 01_monkeyos_doctrine/RENAME_READINESS_PLAN.md
      - Glossary: 01_monkeyos_doctrine/GLOSSARY.md
  - ContextBus Infrastructure:
