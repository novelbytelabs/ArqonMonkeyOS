  - Ground Truth Archive:
      - Overview: ground_truth/arqon_contextos_merged_ground_truth_docs/README.md
      - Ground Truth:
          - 00 Ground Truth: ground_truth/arqon_contextos_merged_ground_truth_docs/docs/00_GROUND_TRUTH.md
          - 01 Vision Mission Objectives: ground_truth/arqon_contextos_merged_ground_truth_docs/docs/01_VISION_MISSION_OBJECTIVES.md
