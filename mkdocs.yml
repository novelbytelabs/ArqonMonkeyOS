          - 17 MonkeyOS ContextBus Doctrine: ground_truth/arqon_contextos_merged_ground_truth_docs/docs/17_MONKEYOS_CONTEXTBUS_DOCTRINE.md
          - 18 Rename Readiness Plan: ground_truth/arqon_contextos_merged_ground_truth_docs/docs/18_RENAME_READINESS_PLAN.md
