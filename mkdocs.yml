          - 03 Architecture: ground_truth/arqon_contextos_merged_ground_truth_docs/docs/03_ARCHITECTURE.md
          - 04 Role Authority Model: ground_truth/arqon_contextos_merged_ground_truth_docs/docs/04_ROLE_AUTHORITY_MODEL.md
          - 05 Command Model: ground_truth/arqon_contextos_merged_ground_truth_docs/docs/05_COMMAND_MODEL.md
