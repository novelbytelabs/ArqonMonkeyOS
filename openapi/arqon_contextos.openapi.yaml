components:
  schemas:
    ScienceCommandRequest:
      type: object
      required: [body]
      properties:
        project:
          type: string
          default: ArqonZero
        flow_ref:
          type: string
          description: Existing science flow id or alias. Optional only for /v1/science/research.
        name:
          type: string
          description: Human-friendly science_flow alias used by /v1/science/research when creating a new flow.
        title:
          type: string
          description: Flow title for new research flows or artifact title fallback.
        summary:
          type: string
        artifact_type:
          type: string
          description: Optional route-allowed artifact type override.
        artifact_title:
          type: string
        body:
          type: string


# PM tasks route retirement note:
# /v1/pm/tasks is retired and must not be used for PM authority.
# Use /v1/pm/tasking for PM tasking/work-order artifacts.
# Coder-side implementation decomposition remains separate.
# Expected retired route error: PM_TASKS_ROUTE_RETIRED_USE_PM_TASKING.


# Route-only boundary: implementation_bundle artifacts are route-only across flow types and must use /v1/coder/implementation-bundle. Direct generic artifact writes return FLOW_ARTIFACT_ROUTE_REQUIRED.


  /v1/helper/execution-intake:
    post:
      operationId: helperExecutionIntake
      summary: Create a Helper execution-intake artifact from an audited Coder handoff
      description: Development diagnostic only. Creates helper_execution_intake only; does not run commands, apply patches, deploy, certify, or promote.
      responses:
        '201':
          description: Helper execution intake created
        '403':
          description: Non-Helper role denied
        '409':
          description: Source boundary, idempotency, promotion, or execution-claim precondition failed


  /v1/helper/execution-report:
    post:
      operationId: helperExecutionReport
      summary: Record Helper execution evidence from an audited Helper intake
      description: Development diagnostic only. Records execution_report, command_log, and evidence_manifest. The Worker does not execute shell commands, deploy, certify, or promote.
      responses:
        '201':
          description: Helper execution evidence recorded
        '403':
          description: Non-Helper role denied
        '409':
          description: Source boundary, idempotency, or forbidden-claim precondition failed


  /v1/auditor/helper-execution-review:
    post:
      operationId: auditorHelperExecutionReview
      summary: Create an Auditor-owned review from Helper execution evidence
      description: Development diagnostic only. Creates helper_execution_review only; does not authorize Human advancement, deployment, certification, or promotion.
      responses:
        '201':
          description: Auditor helper execution review created
        '403':
          description: Non-Auditor role denied
        '409':
          description: Source boundary, idempotency, secret, or forbidden-claim precondition failed


  /v1/human/advancement-decision:
    post:
      operationId: humanAdvancementDecision
      summary: Create a Human-only advancement decision from an Auditor helper-execution review
      description: Development diagnostic only. Creates human_advancement_decision only; does not deploy, certify, promote, or claim production readiness.
      responses:
        '201':
          description: Human advancement decision created
        '403':
          description: Non-Human role denied
        '409':
          description: Source boundary, idempotency, unresolved blocker, secret, or forbidden-claim precondition failed
